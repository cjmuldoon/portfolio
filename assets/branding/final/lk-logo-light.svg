  <text x="200" y="390" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="300" fill="#2C2C2C" fill-opacity="0.75" letter-spacing="5.2" textLength="340" lengthAdjust="spacing">DESIGN AND BUILD</text>
