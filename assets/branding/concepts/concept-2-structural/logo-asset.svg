<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- I-beam cross-section pattern for strokes -->
  </defs>

  <!-- L and K letterforms from I-beam shapes sharing vertical stroke -->
  <g transform="translate(200, 120)">

    <!-- Shared vertical stroke (L vertical = K vertical) — I-beam shape -->
    <!-- Top flange -->
    <rect x="0" y="0" width="80" height="18" rx="2" fill="#C9A96E"/>
    <!-- Web -->
    <rect x="24" y="18" width="32" height="264" fill="#C9A96E"/>
    <!-- Bottom flange -->
    <rect x="0" y="282" width="80" height="18" rx="2" fill="#C9A96E"/>

    <!-- L horizontal foot — I-beam shape rotated -->
    <!-- Left flange (connects to vertical) -->
    <rect x="56" y="246" width="18" height="54" rx="2" fill="#C9A96E"/>
    <!-- Web -->
    <rect x="74" y="260" width="120" height="26" fill="#C9A96E"/>
    <!-- Right flange -->
    <rect x="194" y="246" width="18" height="54" rx="2" fill="#C9A96E"/>

    <!-- K upper diagonal arm — I-beam shaped -->
    <g transform="translate(80, 150) rotate(-45)">
      <!-- Top flange -->
      <rect x="0" y="0" width="60" height="14" rx="2" fill="#C9A96E"/>
      <!-- Web -->
      <rect x="18" y="14" width="24" height="160" fill="#C9A96E"/>
      <!-- Bottom flange -->
      <rect x="0" y="174" width="60" height="14" rx="2" fill="#C9A96E"/>
    </g>

    <!-- K lower diagonal arm — I-beam shaped -->
    <g transform="translate(80, 150) rotate(45)">
      <!-- Top flange -->
      <rect x="0" y="0" width="60" height="14" rx="2" fill="#C9A96E"/>
      <!-- Web -->
      <rect x="18" y="14" width="24" height="160" fill="#C9A96E"/>
      <!-- Bottom flange -->
      <rect x="0" y="174" width="60" height="14" rx="2" fill="#C9A96E"/>
    </g>

    <!-- Horizontal datum / floor plate line through the junction point -->
    <rect x="-40" y="146" width="480" height="3" rx="1" fill="#D4B87A" opacity="0.9"/>

  </g>

  <!-- DESIGN AND BUILD subtitle -->
  <text x="400" y="500" text-anchor="middle"
        font-family="Inter, Helvetica Neue, Arial, sans-serif"
        font-weight="300"
        font-size="28"
        letter-spacing="12"
        fill="#C9A96E">DESIGN AND BUILD</text>
</svg>