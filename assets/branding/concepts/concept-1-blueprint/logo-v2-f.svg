<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300&amp;family=Inter:wght@300;400&amp;display=swap');
      .letter { font-family: 'IBM Plex Mono', 'Courier New', monospace; font-weight: 300; font-size: 168px; fill: #F0EAE0; }
      .tagline { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 400; font-size: 18px; fill: #F0EAE0; letter-spacing: 0.45em; opacity: 0.6; }
      .grid-line { stroke: #F0EAE0; stroke-width: 0.5; opacity: 0.07; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#0A0A0A"/>

  <!-- Grid extends beyond letters — blueprint feel without containment -->
  <line x1="170" y1="108" x2="630" y2="108" class="grid-line"/>
  <line x1="170" y1="184" x2="630" y2="184" class="grid-line"/>
  <line x1="170" y1="260" x2="630" y2="260" class="grid-line"/>
  <line x1="170" y1="336" x2="630" y2="336" class="grid-line"/>
  <line x1="170" y1="412" x2="630" y2="412" class="grid-line"/>
  <line x1="248" y1="60" x2="248" y2="460" class="grid-line"/>
  <line x1="324" y1="60" x2="324" y2="460" class="grid-line"/>
  <line x1="400" y1="60" x2="400" y2="460" class="grid-line"/>
  <line x1="476" y1="60" x2="476" y2="460" class="grid-line"/>
  <line x1="552" y1="60" x2="552" y2="460" class="grid-line"/>

  <!-- Additional fine sub-grid for richer texture -->
  <line x1="286" y1="108" x2="286" y2="412" stroke="#F0EAE0" stroke-width="0.3" opacity="0.03"/>
  <line x1="362" y1="108" x2="362" y2="412" stroke="#F0EAE0" stroke-width="0.3" opacity="0.03"/>
  <line x1="438" y1="108" x2="438" y2="412" stroke="#F0EAE0" stroke-width="0.3" opacity="0.03"/>
  <line x1="514" y1="108" x2="514" y2="412" stroke="#F0EAE0" stroke-width="0.3" opacity="0.03"/>
  <line x1="170" y1="146" x2="630" y2="146" stroke="#F0EAE0" stroke-width="0.3" opacity="0.03"/>
  <line x1="170" y1="222" x2="630" y2="222" stroke="#F0EAE0" stroke-width="0.3" opacity="0.03"/>
  <line x1="170" y1="298" x2="630" y2="298" stroke="#F0EAE0" stroke-width="0.3" opacity="0.03"/>
  <line x1="170" y1="374" x2="630" y2="374" stroke="#F0EAE0" stroke-width="0.3" opacity="0.03"/>

  <!-- LK letterforms -->
  <text x="400" y="310" text-anchor="middle" class="letter">LK</text>

  <!-- DESIGN AND BUILD -->
  <text x="400" y="478" text-anchor="middle" class="tagline">DESIGN AND BUILD</text>
</svg>
