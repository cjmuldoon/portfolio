<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&amp;family=Inter:wght@200&amp;display=swap');
    </style>
  </defs>
  <rect width="800" height="600" fill="#0A0A0A"/>
  <!-- LK in IBM Plex Mono 400 (with slab serifs / upticks) -->
  <text x="200" y="320" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="168" font-weight="400" fill="#F2E6D0" letter-spacing="-0.02em">LK</text>
  <!-- Bridge: connects L foot bottom to K stem bottom, flush with the serif baseline -->
  <rect x="288" y="313" width="64" height="7" fill="#F2E6D0"/>
  <!-- Tagline -->
  <text x="204" y="366" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="16" font-weight="200" fill="#F2E6D0" letter-spacing="8">DESIGN AND BUILD</text>
</svg>
