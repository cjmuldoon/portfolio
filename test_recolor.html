<!DOCTYPE html>
<html><body>
<img id="testimg" src="assets/branding/concepts/concept-1-blueprint/logo-nav-original.svg" alt="" style="background:white;height:100px;">
<div id="out"></div>
<script>
fetch('assets/branding/concepts/concept-1-blueprint/logo-nav-original.svg')
  .then(r => r.text())
  .then(svg => {
    document.getElementById('out').textContent = 'Original first 200 chars: ' + svg.substring(0,200);
    var recol = svg.replace(/fill="[^"]*"/g,'fill="#111111"').replace(/stroke="[^"]*"(?!-width)/g,'stroke="#111111"');
    document.getElementById('out').textContent += '\n\nRecoloured first 200 chars: ' + recol.substring(0,200);
    var blob = URL.createObjectURL(new Blob([recol],{type:'image/svg+xml'}));
    document.getElementById('testimg').src = blob;
  })
  .catch(e => { document.getElementById('out').textContent = 'Error: ' + e.message; });
</script>
</body></html>
